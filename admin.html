<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axom Cars | Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Login overlay style */
        #loginOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a;
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }
        .login-box {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-box h1 { margin-bottom: 20px; font-size: 24px; }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: var(--accent-red);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body class="admin-body">

    <!-- Login Overlay -->
    <div id="loginOverlay">
        <div class="login-box">
            <h1>Admin Login</h1>
            <input type="email" id="adminEmail" placeholder="Enter Email">
            <input type="password" id="adminPass" placeholder="Enter Password">
            <button id="loginBtn" onclick="checkAuth()">Login</button>
            <p id="loginError" style="color: red; margin-top: 10px; display: none;">Invalid Credentials</p>
        </div>
    </div>

    <header class="admin-header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <img src="logo.png" alt="Axom Cars" class="admin-logo">
            <span class="admin-title">Leads Dashboard</span>
        </div>
        <button class="btn-clear" onclick="logout()">Logout</button>
    </header>

    <main class="admin-container">
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Leads</h3>
                <div class="value" id="totalLeads">0</div>
            </div>
            <div class="stat-card">
                <h3>Leads Today</h3>
                <div class="value" id="leadsTodayCount">0</div>
            </div>
        </div>

        <div class="leads-table-container">
            <div class="table-header-actions">
                <h2>Customer Inquiries</h2>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <select id="dateFilter" onchange="renderLeads()" style="padding: 8px; border-radius: 6px; border: 1px solid #ddd; outline: none; font-family: 'Poppins', sans-serif;">
                        <option value="all">All Time</option>
                        <option value="current">Current Month</option>
                        <option value="last3">Last 3 Months</option>
                    </select>
                    <button class="btn-export" onclick="exportToCSV()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                        Download Sheet
                    </button>
                </div>
            </div>
            <div id="tableWrapper">
                <table class="leads-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Type</th>
                            <th>Name</th>
                            <th>Mobile</th>
                            <th>Model</th>
                            <th>Outlet</th>
                        </tr>
                    </thead>
                    <tbody id="leadsBody">
                        <!-- Leads will be injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBOjZ51fEzgaBPyZvkwsIjaza3Uu5NutF4",
            authDomain: "axom-cars.firebaseapp.com",
            databaseURL: "https://axom-cars-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "axom-cars",
            storageBucket: "axom-cars.firebasestorage.app",
            messagingSenderId: "1011433356105",
            appId: "1:1011433356105:web:7629781533d27dabf23898"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // Check auth state on load
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('loginOverlay').style.display = 'none';
                renderLeads();
            } else {
                document.getElementById('loginOverlay').style.display = 'flex';
            }
        });

        async function checkAuth() {
            const email = document.getElementById('adminEmail').value;
            const pass = document.getElementById('adminPass').value;
            const btn = document.getElementById('loginBtn');
            const error = document.getElementById('loginError');

            btn.disabled = true;
            btn.textContent = 'Authenticating...';
            error.style.display = 'none';

            try {
                await auth.signInWithEmailAndPassword(email, pass);
            } catch (err) {
                console.error(err);
                error.textContent = err.message;
                error.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Login';
            }
        }

        // Add Enter key listener
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && document.getElementById('loginOverlay').style.display !== 'none') {
                checkAuth();
            }
        });

        function logout() {
            auth.signOut().then(() => {
                location.reload();
            });
        }

        async function renderLeads() {
            const body = document.getElementById('leadsBody');
            const totalEl = document.getElementById('totalLeads');
            const latestEl = document.getElementById('leadsTodayCount');
            const filterValue = document.getElementById('dateFilter').value;

            body.innerHTML = '<tr><td colspan="6" class="empty-state">Loading leads...</td></tr>';

            try {
                // Fetch from Firestore
                const snapshot = await db.collection("leads").orderBy("id", "desc").get();
                let leads = [];
                snapshot.forEach(doc => {
                    leads.push({ docId: doc.id, ...doc.data() });
                });

                // Filter logic
                if (filterValue !== 'all') {
                    const now = new Date();
                    const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
                    const threeMonthsAgo = new Date(now.getFullYear(), now.getMonth() - 3, 1).getTime();

                    leads = leads.filter(lead => {
                        const leadTime = lead.id; // Using the 'id' which is Date.now()
                        if (filterValue === 'current') {
                            return leadTime >= startOfMonth;
                        } else if (filterValue === 'last3') {
                            return leadTime >= threeMonthsAgo;
                        }
                        return true;
                    });
                }

                // Update Stats
                totalEl.textContent = leads.length;
                
                // Calculate Leads Today
                const startOfToday = new Date().setHours(0, 0, 0, 0);
                const todayLeads = leads.filter(l => l.id >= startOfToday);
                latestEl.textContent = todayLeads.length;

                if (leads.length === 0) {
                    body.innerHTML = '<tr><td colspan="6" class="empty-state">No leads found in cloud.</td></tr>';
                    return;
                }

                body.innerHTML = leads.map(lead => `
                    <tr>
                        <td style="font-size: 11px; white-space: nowrap;">${lead.date || 'N/A'}</td>
                        <td><span style="background: ${lead.type === 'Test Drive' ? '#fff4f4' : '#f4fff4'}; color: ${lead.type === 'Test Drive' ? '#e74c3c' : '#27ae60'}; padding: 4px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; border: 1px solid currentColor;">${(lead.type || 'Inquiry').toUpperCase()}</span></td>
                        <td style="font-weight: 600;">${lead.name || 'N/A'}</td>
                        <td>${lead.mobile || 'N/A'}</td>
                        <td><span style="background: #e1e7ec; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600;">${(lead.model || 'N/A').toUpperCase()}</span></td>
                        <td style="font-weight: 600;">${(lead.outlet || 'N/A').toUpperCase()}</td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error("Error fetching leads: ", error);
                body.innerHTML = '<tr><td colspan="6" class="empty-state" style="color: red;">Error loading leads. Check console.</td></tr>';
            }
        }

        async function exportToCSV() {
            const filterValue = document.getElementById('dateFilter').value;
            const snapshot = await db.collection("leads").orderBy("id", "desc").get();
            let leads = [];
            snapshot.forEach(doc => leads.push(doc.data()));
            
            // Apply current filter to export
            if (filterValue !== 'all') {
                const now = new Date();
                const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
                const threeMonthsAgo = new Date(now.getFullYear(), now.getMonth() - 3, 1).getTime();

                leads = leads.filter(lead => {
                    const leadTime = lead.id;
                    if (filterValue === 'current') return leadTime >= startOfMonth;
                    if (filterValue === 'last3') return leadTime >= threeMonthsAgo;
                    return true;
                });
            }

            if (leads.length === 0) {
                alert('No leads to export.');
                return;
            }

            const headers = ['Date', 'Type', 'Name', 'Mobile', 'Model', 'Outlet'];
            // Wrap in quotes to handle commas
            const rows = leads.map(l => [
                `"${l.date || ''}"`, 
                `"${l.type || 'Inquiry'}"`, 
                `"${l.name || ''}"`, 
                `"${l.mobile || ''}"`, 
                `"${l.model || ''}"`, 
                `"${l.outlet || ''}"`
            ]);

            let csvContent = "data:text/csv;charset=utf-8," 
                + headers.join(",") + "\n"
                + rows.map(e => e.join(",")).join("\n");

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "axom_leads_" + new Date().toLocaleDateString() + ".csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
